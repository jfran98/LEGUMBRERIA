<!-- public/cambiar-rol.html -->
<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión del Personal - legumbreria</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    #soloGerente,
    #noGerente {
      display: none;
    }
  </style>
</head>

<body>
  <!-- Navbar dinámico -->
  <div id="navbar"></div>

  <div class="container-gestion">
    <div class="header-gestion">
      <h1><i class="fas fa-users-cog"></i> Gestión del Personal</h1>
      <p>Panel de administración para gerentes</p>
    </div>

    <div id="soloGerente">
      <!-- Dashboard de gestión -->
      <div class="dashboard-grid">

        <!-- Gestión de Roles -->
        <div class="card-gestion">
          <div class="card-header">
            <i class="fas fa-user-tag"></i>
            <h3>Gestión de Roles</h3>
          </div>
          <div class="card-content">
            <form id="formRol" class="form-gestion">
              <div class="form-group">
                <label for="email">Correo del empleado</label>
                <input type="email" name="email" id="email" placeholder="empleado@legumbreria.com" required>
              </div>
              <div class="form-group">
                <label for="rol">Nuevo rol</label>
                <select name="rol" id="rol" required onchange="toggleCamposNomina(this.value)">
                  <option value="">Selecciona nuevo rol</option>
                  <option value="usuario">Usuario</option>
                  <option value="empleado">Empleado</option>
                  <option value="gerente">Gerente</option>
                </select>
              </div>

              <!-- Campos extra para empleados/gerentes -->
              <div id="camposNomina"
                style="display: none; border: 1px dashed var(--color-primary); padding: 15px; border-radius: 8px; margin-top: 10px;">
                <h4 style="color: var(--color-primary); margin-bottom: 10px;"><i class="fas fa-money-bill-wave"></i>
                  Datos de Nómina</h4>
                <div class="form-group">
                  <label for="documento">Documento (CC)</label>
                  <input type="text" name="documento" id="documento" placeholder="Número de identificación">
                </div>
                <div class="form-group">
                  <label for="salario">Salario Mensual (COP)</label>
                  <input type="number" name="salario_mensual" id="salario" value="1750905">
                </div>
                <div class="form-group">
                  <label for="auxilio">Auxilio Transporte (COP)</label>
                  <input type="number" name="auxilio_transporte" id="auxilio" value="249095">
                </div>
              </div>

              <button type="submit" class="btn-primary" style="margin-top: 20px;">
                <i class="fas fa-save"></i> Guardar Cambios
              </button>
            </form>
          </div>
        </div>

      </div>

      <!-- Mensajes de respuesta -->
      <div class="mensaje" id="mensaje"></div>
    </div>

    <div id="noGerente">
      <div class="no-access">
        <i class="fas fa-lock"></i>
        <h2>Acceso Restringido</h2>
        <p>Solo los gerentes pueden acceder a la gestión del personal.</p>
        <a href="index.html" class="btn-secondary">Volver al Inicio</a>
      </div>
    </div>
  </div>

  <link rel="stylesheet" href="css/cambiar-rol.css">

  <script src="js/role-verifier.js"></script>
  <script src="navbar.js"></script>
  <script>
    // Verificación de roles - DEBE SER LO PRIMERO
    if (!roleVerifier.init('cambiar-rol.html')) {
      throw new Error('Acceso denegado');
    }

    // Verificación de gerente
    async function verificarGerente() {
      const token = localStorage.getItem('token');
      if (!token) return false;
      try {
        const res = await fetch('http://localhost:4545/mi-rol', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        return data.rol === 'gerente';
      } catch {
        return false;
      }
    }

    // Mostrar/Ocultar campos de nómina
    function toggleCamposNomina(rol) {
      const div = document.getElementById('camposNomina');
      if (rol === 'empleado' || rol === 'gerente') {
        div.style.display = 'block';
      } else {
        div.style.display = 'none';
      }
    }

    // Mostrar mensaje
    function mostrarMensaje(texto, tipo = 'success') {
      const mensaje = document.getElementById('mensaje');
      mensaje.textContent = texto;
      mensaje.className = `mensaje ${tipo}`;
      setTimeout(() => {
        mensaje.textContent = '';
        mensaje.className = 'mensaje';
      }, 5000);
    }

    // Inicialización
    (async () => {
      const esGerente = await verificarGerente();
      document.getElementById('soloGerente').style.display = esGerente ? 'block' : 'none';
      document.getElementById('noGerente').style.display = esGerente ? 'none' : 'block';
    })();

    // Gestión de Roles
    document.getElementById('formRol')?.addEventListener('submit', async function (e) {
      e.preventDefault();
      const formData = new FormData(this);
      const datos = Object.fromEntries(formData.entries());

      try {
        const token = localStorage.getItem('token');
        const res = await fetch('http://localhost:4545/cambiar-rol', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify(datos),
        });
        const resultado = await res.json();
        if (res.ok) {
          mostrarMensaje('✅ Rol cambiado correctamente', 'success');
          this.reset();
        } else {
          mostrarMensaje(resultado.mensaje || resultado.error || 'Error al cambiar rol', 'error');
        }
      } catch (error) {
        mostrarMensaje('Error al conectar con el servidor', 'error');
      }
    });
  </script>
</body>

</html>
