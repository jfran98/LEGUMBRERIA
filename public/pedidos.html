<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Pedidos - legumbreria</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/pedidos.css">
  <script src="js/role-verifier.js"></script>

  <script>
    // Verificación de roles - DEBE SER LO PRIMERO
    if (!roleVerifier.init('pedidos.html')) {
      // Si no tiene acceso, la función ya redirige automáticamente
      // No ejecutar el resto del código
      throw new Error('Acceso denegado');
    }
  </script>
</head>

<body>
  <header id="navbar-container"></header>

  <div class="container">
    <h2>📋 Gestión de Pedidos</h2>

    <div class="filtros">
      <label for="filtro-estado">Filtrar por estado:</label>
      <select id="filtro-estado" onchange="filtrarPedidos()">
        <option value="">Todos los estados</option>
        <option value="pendiente">Pendientes</option>
        <option value="aprobada">Aprobados</option>
        <option value="rechazada">Rechazados</option>
      </select>

      <label for="filtro-metodo">Filtrar por método de pago:</label>
      <select id="filtro-metodo" onchange="filtrarPedidos()">
        <option value="">Todos los métodos</option>
        <option value="contraentrega">Contraentrega</option>
        <option value="bancolombia">Bancolombia</option>
        <option value="nequi">Nequi</option>
      </select>
    </div>

    <div id="pedidos-container">
      <!-- Los pedidos se cargarán aquí dinámicamente -->
    </div>
  </div>

  <script>
    let todosLosPedidos = [];
    let pedidosFiltrados = [];

    async function cargarPedidos() {
      const token = localStorage.getItem('token');
      if (!token) {
        alert('Debes iniciar sesión.');
        window.location.href = '/login.html';
        return;
      }

      console.log('Token encontrado, intentando cargar pedidos...');

      try {
        console.log('Haciendo fetch a /venta/pedidos...');
        const res = await fetch('/venta/pedidos', {
          headers: {
            'Authorization': 'Bearer ' + token
          }
        });

        console.log('Respuesta recibida:', res.status, res.statusText);

        if (!res.ok) {
          if (res.status === 403) {
            alert('No tienes permisos para acceder a esta página.');
            window.location.href = '/index.html';
            return;
          }
          const errorText = await res.text();
          console.error('Error en respuesta:', errorText);
          throw new Error(`Error al cargar pedidos: ${res.status} ${res.statusText}`);
        }

        const data = await res.json();
        console.log('Datos recibidos:', data);

        todosLosPedidos = data.pedidos || [];
        pedidosFiltrados = [...todosLosPedidos];
        console.log('Pedidos cargados:', todosLosPedidos.length);
        mostrarPedidos();
      } catch (error) {
        console.error('Error completo:', error);
        document.getElementById('pedidos-container').innerHTML =
          `<div class="sin-pedidos">
            Error al cargar los pedidos: ${error.message}<br>
            <small>Revisa la consola para más detalles</small>
          </div>`;
      }
    }

    function filtrarPedidos() {
      const filtroEstado = document.getElementById('filtro-estado').value;
      const filtroMetodo = document.getElementById('filtro-metodo').value;

      pedidosFiltrados = todosLosPedidos.filter(pedido => {
        const estadoNombre = (pedido.estado || '').toLowerCase();
        const metodopago = (pedido.metodopago || '').toLowerCase();
        const cumpleEstado = !filtroEstado || estadoNombre === filtroEstado;
        const cumpleMetodo = !filtroMetodo || metodopago === filtroMetodo;
        return cumpleEstado && cumpleMetodo;
      });

      mostrarPedidos();
    }

    function mostrarPedidos() {
      const container = document.getElementById('pedidos-container');

      if (pedidosFiltrados.length === 0) {
        container.innerHTML = '<div class="sin-pedidos">No hay pedidos que coincidan con los filtros seleccionados.</div>';
        return;
      }

      container.innerHTML = '';

      pedidosFiltrados.forEach(pedido => {
        const pedidoCard = crearPedidoCard(pedido);
        container.appendChild(pedidoCard);
      });
    }

    function crearPedidoCard(pedido) {
      const card = document.createElement('div');
      card.className = 'pedido-card';

      const estadoStr = (pedido.estado || 'pendiente').toLowerCase();
      const estadoClass = `estado-${estadoStr}`;
      const estadoText = estadoStr.charAt(0).toUpperCase() + estadoStr.slice(1);

      const instruccionesPago = obtenerInstruccionesPago(pedido.metodopago);

      card.innerHTML = `
        <div class="pedido-header">
          <div>
            <h3>Pedido #${pedido.idpedido}</h3>
            <span class="${estadoClass}">${estadoText}</span>
          </div>
          <div>
            <strong>Fecha:</strong> ${new Date(pedido.fecha).toLocaleDateString('es-ES')}
          </div>
        </div>
        
        <div class="pedido-info">
          <div class="pedido-details">
            <div class="box">
              <h4>Cliente</h4>
                      <p><strong>Nombre:</strong> ${pedido.nombres || 'No especificado'}</p>
        <p><strong>Documento:</strong> ${pedido.documento || 'No especificado'}</p>
        <p><strong>Correo:</strong> ${pedido.correo || 'No especificado'}</p>
        <p><strong>Teléfono:</strong> ${pedido.telefono || 'No registrado'}</p>
            </div>
            <div class="box">
              <h4>Detalles del Pedido</h4>
                      <p><strong>Total:</strong> $${Number(pedido.total || 0).toLocaleString()}</p>
        <p><strong>ID Factura:</strong> ${pedido.idfactura || 'N/A'}</p>
            </div>
          </div>
          
          <div class="metodo-pago">
            <h4>Método de Pago: ${(pedido.metodopago || 'No especificado').charAt(0).toUpperCase() + (pedido.metodopago || 'No especificado').slice(1)}</h4>
            ${instruccionesPago}
          </div>
          
          <table class="productos-table">
            <thead>
              <tr>
                <th>Producto</th>
                <th>Cantidad</th>
                <th>Precio Unitario</th>
                <th>Subtotal</th>
              </tr>
            </thead>
            <tbody>
              ${(pedido.detalles || []).map(d => `
                <tr>
                  <td>${d.nombre || 'Producto'}</td>
                  <td>${Number(d.cantidad || 0).toFixed(2)} kg</td>
                  <td>$${Number(d.preciounitario || 0).toLocaleString()}</td>
                  <td>$${Number(d.subtotal || 0).toLocaleString()}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
          
          <div class="total">Total: $${Number(pedido.total || 0).toLocaleString()}</div>
          
          ${(pedido.estado || '').toLowerCase() === 'pendiente' ? `
            <div class="acciones">
              <button class="btn-aprobar" onclick="cambiarEstado(${pedido.idpedido}, 2)">
                ✅ Aprobar Pedido
              </button>
              <button class="btn-rechazar" onclick="cambiarEstado(${pedido.idpedido}, 3)">
                ❌ Rechazar Pedido
              </button>
            </div>
          ` : ''}
        </div>
      `;

      return card;
    }

    function obtenerInstruccionesPago(metodopago) {
      const metodo = (metodopago || '').toLowerCase();
      switch (metodo) {
        case 'contraentrega':
          return '<p>El cliente pagará al momento de la entrega. Verificar que tenga el monto exacto.</p>';
        case 'bancolombia':
          return '<p>Verificar que el cliente haya enviado el comprobante de transferencia a la cuenta <strong>XXX-XXXXXX-XX</strong>.</p>';
        case 'nequi':
          return '<p>Verificar que el cliente haya enviado el comprobante de transferencia al número <strong>3XX XXX XXXX</strong>.</p>';
        default:
          return '<p>Método de pago no especificado.</p>';
      }
    }

    async function cambiarEstado(idpedido, nuevoEstado) {
      const token = localStorage.getItem('token');
      if (!token) {
        alert('Debes iniciar sesión.');
        return;
      }

      const confirmacion = confirm(`¿Estás seguro de que quieres ${nuevoEstado === 2 ? 'aprobar' : 'rechazar'} el pedido #${idpedido}?`);
      if (!confirmacion) return;

      try {
        const res = await fetch(`/venta/pedido/${idpedido}/estado`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({ idestado: nuevoEstado })
        });

        if (!res.ok) {
          const errorData = await res.json().catch(() => ({}));
          throw new Error(errorData.mensaje || errorData.detalle || 'Error al cambiar el estado');
        }

        // Convertir nuevoEstado a número para comparaciones seguras
        const idEstadoNum = Number(nuevoEstado);

        // Eliminar de la lista local si fue procesado (aprobado o rechazado)
        if (idEstadoNum === 2 || idEstadoNum === 3) {
          todosLosPedidos = todosLosPedidos.filter(p => p.idpedido !== idpedido);
          alert(idEstadoNum === 2 ? '✅ Pedido aprobado y movido al historial.' : '🛑 Pedido rechazado y archivado.');
        } else {
          // Otros estados (pendiente, etc)
          const pedido = todosLosPedidos.find(p => p.idpedido === idpedido);
          if (pedido) {
            const nombres = { 1: 'pendiente', 2: 'aprobada', 3: 'rechazada' };
            pedido.estado = nombres[idEstadoNum] || 'pendiente';
          }
        }

        // Recargar la vista
        filtrarPedidos();

        alert(`Pedido #${idpedido} ${nuevoEstado === 2 ? 'aprobado' : 'rechazado'} exitosamente.`);
      } catch (error) {
        console.error('Error:', error);
        alert('Error al cambiar el estado del pedido. Intenta de nuevo.');
      }
    }

    // Cargar pedidos al iniciar la página
    document.addEventListener('DOMContentLoaded', cargarPedidos);
  </script>
  <script src="navbar.js"></script>
</body>

</html>
