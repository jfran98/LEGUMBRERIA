<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Iniciar Sesión</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
</head>

<body>


  <div class="login-container">
    <h2>Iniciar Sesión <span style="font-size: 10px; color: #ccc;">v2.1-sync</span></h2>
    <form id="formLogin">
      <input type="email" name="t3" placeholder="Correo electrónico" required>
      <input type="password" name="t5" placeholder="Contraseña" required>
      <button type="submit">Ingresar</button>
      <div class="mensaje" id="mensaje"></div>
      <div style="margin-top: 15px; text-align: center;">
        <span style="color: var(--text-muted);">¿No tienes cuenta?</span>
        <a href="registro.html" style="color: var(--primary); text-decoration: none; font-weight: bold; margin-left: 5px;">Crear cuenta</a>
      </div>
    </form>
  </div>

  <script>
    document.getElementById('formLogin').addEventListener('submit', async function (e) {
      e.preventDefault();

      const formData = new FormData(this);
      const datos = Object.fromEntries(formData.entries());
      const mensaje = document.getElementById('mensaje');

      const btn = this.querySelector('button');
      btn.disabled = true;
      const originalText = btn.textContent;
      btn.textContent = 'Ingresando...';

      try {
        console.log('🚀 [FRONTEND] Enviando login, esperando respuesta...');
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ t3: datos.t3, t5: datos.t5 }),
        });

        const resultado = await res.json();

        if (res.ok) {
          localStorage.setItem('token', resultado.token);
          mensaje.style.color = 'green';
          mensaje.textContent = 'Inicio de sesión exitoso.';
          // Esperar exactamente 1 segundo antes de redirigir
          setTimeout(() => window.location.href = 'perfil.html', 1000);
        } else {
          btn.disabled = false;
          btn.textContent = originalText;
          mensaje.style.color = 'red';
          mensaje.textContent = resultado.mensaje || resultado.error || 'Credenciales inválidas.';
        }
      } catch (error) {
        btn.disabled = false;
        btn.textContent = originalText;
        mensaje.style.color = 'red';
        mensaje.textContent = 'Error al conectar con el servidor.';
        console.error(error);
      }
    });
  </script>

  <!-- Cargar el navbar después del DOM -->
  <script src="navbar.js"></script>
</body>

</html>
