<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar Nuevo Producto - Legumbrería JM</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Estilos específicos para este formulario */
    .form-container {
      max-width: 800px;
      margin: 40px auto;
      padding: 30px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    .form-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .form-header h2 {
      color: var(--color-primary, #333);
      margin-bottom: 10px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .form-row .form-group {
      flex: 1;
      min-width: 200px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #374151;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--color-accent, #fbbf24);
      box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1);
    }

    .btn-submit {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%);
      border: none;
      border-radius: 8px;
      color: #1a1a1a;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s;
      margin-top: 20px;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 170, 0, 0.3);
    }

    .mensaje {
      margin-top: 20px;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      display: none;
    }

    .mensaje.success {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #34d399;
    }

    .mensaje.error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #f87171;
    }
  </style>
</head>

<body>
  <div id="navbar"></div>

  <div class="form-container">
    <div class="form-header">
      <h2>📦 Registrar Nuevo Producto</h2>
      <p>Ingresa los detalles para crear un nuevo producto en el catálogo</p>
    </div>

    <form id="formProducto">

      <!-- Información Básica -->
      <div class="form-group">
        <label for="nombre">Nombre del Producto *</label>
        <input type="text" id="nombre" name="nombre" placeholder="Ej: Tomate Chonto" list="lista-productos-nombres"
          required>
        <datalist id="lista-productos-nombres"></datalist>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="tipo_venta">Tipo de Venta *</label>
          <select id="tipo_venta" name="tipo_venta" required>
            <option value="">Seleccionar...</option>
            <option value="KG">Kilogramo (KG)</option>
            <option value="UNIDAD">Unidad</option>
          </select>
        </div>
        <div class="form-group">
          <label for="idcategoria">Categoría *</label>
          <select id="idcategoria" name="idcategoria" required>
            <option value="">Seleccionar...</option>
            <option value="1">Legumbres</option>
            <option value="2">Frutas</option>
            <option value="3">Hortalizas</option>
            <option value="4">Cereales</option>
            <option value="5">Hierbas</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="descripcion">Descripción</label>
        <textarea id="descripcion" name="descripcion" rows="3"
          placeholder="Detalles adicionales del producto..."></textarea>
      </div>

      <hr style="margin: 30px 0; border: 0; border-top: 1px solid #e5e7eb;">

      <!-- Datos de Inventario -->
      <h3 style="margin-bottom: 20px; font-size: 1.1em; color: #4b5563;">📊 Datos de Inventario y Precio
      </h3>

      <div class="form-row">
        <div class="form-group">
          <label for="cantidad">Stock Inicial *</label>
          <input type="number" id="cantidad" name="cantidad" min="0" step="0.01" required>
        </div>
        <div class="form-group">
          <label for="precio">Precio Unitario ($) *</label>
          <input type="number" id="precio" name="precio" min="0" step="0.01" required>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="btnSubmit">Registrar Producto</button>
      <a href="editar-producto.html" id="btnCancelar"
        style="display: block; text-align: center; margin-top: 15px; color: #666; text-decoration: none; font-size: 14px;">Cancelar
        y volver</a>

      <div id="mensaje" class="mensaje"></div>

    </form>
  </div>

  <script src="navbar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('formProducto');
      const mensajeDiv = document.getElementById('mensaje');
      const btnSubmit = document.getElementById('btnSubmit');

      // Envío del formulario
      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Bloquear botón
        btnSubmit.disabled = true;
        btnSubmit.textContent = 'Guardando...';
        mostrarMensaje('', ''); // Limpiar mensaje

        try {
          // Usamos objeto plano y JSON en lugar de FormData para simplificar, 
          // ya que no hay subida de archivos (imágenes).
          const formData = new FormData(form);
          const dataObj = Object.fromEntries(formData.entries());

          console.log('Enviando datos:', dataObj);

          const baseUrl = window.location.origin;
          const token = localStorage.getItem('token');

          const res = await fetch(baseUrl + '/legumbreria/productos', {
            method: 'POST',
            body: JSON.stringify(dataObj),
            headers: {
              'Content-Type': 'application/json',
              ...(token ? { 'Authorization': 'Bearer ' + token } : {})
            }
          });

          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.mensaje || data.error || 'Error al guardar el producto');
          }

          mostrarMensaje('✅ Producto registrado exitosamente!', 'success');
          form.reset();

        } catch (error) {
          console.error('Error:', error);
          mostrarMensaje('❌ Error: ' + error.message, 'error');
        } finally {
          btnSubmit.disabled = false;
          btnSubmit.textContent = 'Registrar Producto';
        }
      });

      function mostrarMensaje(texto, tipo) {
        mensajeDiv.textContent = texto;
        mensajeDiv.className = 'mensaje ' + tipo;
        mensajeDiv.style.display = texto ? 'block' : 'none';
      }

      // Cargar nombres para el autocomplete
      async function cargarNombresExistentes() {
        try {
          const baseUrl = window.location.origin;
          const res = await fetch(baseUrl + '/legumbreria/productos');
          const productos = await res.json();
          if (Array.isArray(productos)) {
            const datalist = document.getElementById('lista-productos-nombres');
            datalist.innerHTML = productos.map(p => `<option value="${p.nombre}">`).join('');
          }
        } catch (err) {
          console.error('Error cargando nombres para autocomplete:', err);
        }
      }
      cargarNombresExistentes();
    });
  </script>
</body>

</html>
