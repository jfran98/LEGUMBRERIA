<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Agregar Producto - Legumbrería JM</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ...estilos igual que tu versión moderna... */
  </style>
  <script src="navbar.js"></script>
</head>
<body>
  <div class="form-container">
    <h2>Agregar Nuevo Producto</h2>
    <form id="formProducto" enctype="multipart/form-data">
      <label for="nombre">Nombre del producto:</label>
      <input type="text" id="nombre" name="nombre" required>

      <label for="categoria">Categoría:</label>
      <select id="categoria" name="categoria" required>
        <option value="">Seleccionar</option>
        <option value="Frutas">Frutas</option>
        <option value="Verduras">Verduras</option>
        <option value="Ofertas">Ofertas</option>
      </select>

      <label for="precio">Precio:</label>
      <input type="number" id="precio" name="precio" step="0.01" required>

      <label for="unidad">Unidad de venta:</label>
      <select id="unidad" name="unidad" required>
        <option value="kg">Kilogramo (kg)</option>
        <option value="lb">Libra (lb)</option>
      </select>

      <label for="stock">Cantidad disponible:</label>
      <input type="number" id="stock" name="stock" step="0.01" required>

      <label for="imagen">Imagen del producto (URL):</label>
      <input type="text" id="imagen" name="imagen" maxlength="255">

      <label for="descripcion">Descripción:</label>
      <textarea id="descripcion" name="descripcion" rows="4"></textarea>

      <button type="submit">Agregar Producto</button>
      <div class="mensaje" id="mensaje"></div>
    </form>
  </div>
  <script>
    document.getElementById('formProducto').addEventListener('submit', async function(e) {
      e.preventDefault();
      const formData = new FormData(this);
      const datos = Object.fromEntries(formData.entries());
      const mensaje = document.getElementById('mensaje');
      try {
        const token = localStorage.getItem('token');
        const res = await fetch('http://localhost:4545/productos', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify(datos),
        });
        const resultado = await res.json();
        if (res.ok) {
          mensaje.style.color = 'green';
          mensaje.textContent = 'Producto registrado correctamente.';
          this.reset();
        } else {
          mensaje.style.color = 'red';
          mensaje.textContent = resultado.mensaje || resultado.error || 'Error al registrar producto.';
        }
      } catch (error) {
        mensaje.style.color = 'red';
        mensaje.textContent = 'Error al conectar con el servidor.';
      }
    });
  </script>
</body>
</html>
