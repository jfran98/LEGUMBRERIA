<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos - Legumbrería JM</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/productos.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="navbar.js" defer></script>
  <style>
    #destacados-section {
      display: none;
    }
  </style>
</head>

<body>
  <header id="navbar-container"></header>
  <div class="container">
    <!-- Carousel Section -->
    <div class="carousel-section" id="destacados-section">
      <div class="carousel-header">
        <h3>✨ Productos Sugeridos</h3>
        <div class="carousel-controls">
          <button id="prev-btn" class="carousel-btn">←</button>
          <button id="next-btn" class="carousel-btn">→</button>
        </div>
      </div>
      <div id="carousel-grid" class="carousel-grid"></div>
    </div>

    <h2 id="titulo-lista">Nuestros Productos</h2>

    <!-- Filtros de Categoría -->
    <div class="categoria-filtros">
      <button class="btn-categoria active" data-categoria="todos">Todos</button>
      <button class="btn-categoria" data-categoria="1">Legumbres</button>
      <button class="btn-categoria" data-categoria="2">Frutas</button>
      <button class="btn-categoria" data-categoria="3">Hortalizas</button>
      <button class="btn-categoria" data-categoria="4">Cereales</button>
      <button class="btn-categoria" data-categoria="5">Hierbas</button>
    </div>

    <div id="categorias-container" class="categorias-container"></div>

    <div id="sin-resultados" class="sin-resultados">
      No se encontraron productos disponibles en esta categoría.
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const buscar = (params.get('buscar') || '').trim().toLowerCase();
      const categoriasContainer = document.getElementById('categorias-container');
      const vacio = document.getElementById('sin-resultados');
      const titulo = document.getElementById('titulo-lista');
      let currentCategoria = 'todos';
      let allProductos = [];

      if (buscar) {
        titulo.textContent = `Resultados para: "${buscar}"`;
      }

      // Manejo de filtros de categoría
      const botonesFiltro = document.querySelectorAll('.btn-categoria');
      botonesFiltro.forEach(btn => {
        btn.addEventListener('click', () => {
          botonesFiltro.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentCategoria = btn.getAttribute('data-categoria');
          renderizarActual();
        });
      });

      // Fetch inicial
      fetch('/legumbreria/productos')
        .then(r => {
          if (!r.ok) throw new Error('Error al cargar productos');
          return r.json();
        })
        .then(productos => {
          allProductos = Array.isArray(productos) ? productos : [];
          renderizarActual();

          // Iniciar Carrusel si hay productos
          if (allProductos.length > 0) {
            iniciarCarrusel(allProductos);
          }
        })
        .catch(err => {
          console.error(err);
          vacio.style.display = 'block';
          vacio.textContent = 'No fue posible cargar los productos.';
        });

      const imagenesCategoria = {
        'Legumbres': 'img/productos/combo-vergetales.jpg',
        'Frutas': 'img/productos/combo-frutas.jpg',
        'Hortalizas': 'img/productos/combo-vergetales.jpg',
        'Cereales': 'https://images.unsplash.com/photo-1586201375761-83865001e31c?q=80&w=400&h=300&auto=format&fit=crop',
        'Hierbas': 'https://images.unsplash.com/photo-1596715364265-55577c7ec524?q=80&w=400&h=300&auto=format&fit=crop',
        'default': 'https://images.unsplash.com/photo-1542838132-92c53300491e?q=80&w=400&h=300&auto=format&fit=crop'
      };

      function normalizarNombre(nombre) {
        return nombre.toLowerCase()
          .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
          .replace(/\s+/g, '-')
          .replace(/[^\w-]/g, '');
      }

      function renderizarActual() {
        if (!allProductos || allProductos.length === 0) {
          categoriasContainer.innerHTML = '';
          vacio.style.display = 'block';
          vacio.textContent = 'No hay productos disponibles.';
          return;
        }

        const normalize = (val) => String(val || '').trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

        const filtrados = allProductos.filter(p => {
          const matchBusqueda = !buscar || [p.nombre || '', p.descripcion || ''].join(' ').toLowerCase().includes(buscar);
          const matchCategoria = currentCategoria === 'todos' || String(p.idcategoria) === String(currentCategoria);
          return matchBusqueda && matchCategoria;
        });

        vacio.style.display = filtrados.length === 0 ? 'block' : 'none';
        categoriasContainer.innerHTML = '';

        if (currentCategoria === 'todos' && !buscar) {
          // Vista por Categorías (Organizada en Carruseles)
          const categoriasOficiales = [
            { id: 1, nombre: 'Legumbres' },
            { id: 2, nombre: 'Frutas' },
            { id: 3, nombre: 'Hortalizas' },
            { id: 4, nombre: 'Cereales' },
            { id: 5, nombre: 'Hierbas' }
          ];

          let idsMostrados = new Set();

          categoriasOficiales.forEach(cat => {
            const productosCat = allProductos.filter(p => parseInt(p.idcategoria) === cat.id);
            if (productosCat.length > 0) {
              const section = document.createElement('div');
              section.className = 'categoria-section fade-in';
              section.innerHTML = `
                <div class="category-header">
                  <h3>${cat.nombre}</h3>
                  <div class="carousel-controls">
                    <button class="cat-prev-btn carousel-btn">←</button>
                    <button class="cat-next-btn carousel-btn">→</button>
                  </div>
                </div>
                <div class="category-carousel">
                  <div class="category-grid"></div>
                </div>
              `;
              const innerGrid = section.querySelector('.category-grid');
              const prevBtn = section.querySelector('.cat-prev-btn');
              const nextBtn = section.querySelector('.cat-next-btn');

              prevBtn.onclick = () => innerGrid.scrollBy({ left: -300, behavior: 'smooth' });
              nextBtn.onclick = () => innerGrid.scrollBy({ left: 300, behavior: 'smooth' });

              productosCat.forEach(p => {
                crearCardProducto(p, innerGrid);
                idsMostrados.add(p.idproductos);
              });
              categoriasContainer.appendChild(section);
            }
          });

          // Otras categorías si existen
          const otros = allProductos.filter(p => !idsMostrados.has(p.idproductos));
          if (otros.length > 0) {
            const section = document.createElement('div');
            section.className = 'categoria-section fade-in';
            section.innerHTML = `
                <div class="category-header">
                  <h3>Otras Categorías</h3>
                  <div class="carousel-controls">
                    <button class="cat-prev-btn carousel-btn">←</button>
                    <button class="cat-next-btn carousel-btn">→</button>
                  </div>
                </div>
                <div class="category-carousel">
                  <div class="category-grid"></div>
                </div>
              `;
            const innerGrid = section.querySelector('.category-grid');
            const prevBtn = section.querySelector('.cat-prev-btn');
            const nextBtn = section.querySelector('.cat-next-btn');

            prevBtn.onclick = () => innerGrid.scrollBy({ left: -300, behavior: 'smooth' });
            nextBtn.onclick = () => innerGrid.scrollBy({ left: 300, behavior: 'smooth' });

            otros.forEach(p => crearCardProducto(p, innerGrid));
            categoriasContainer.appendChild(section);
          }
        } else {
          // Vista de grilla simple (para filtros o búsqueda - se mantiene Grid para legibilidad)
          const simpleSection = document.createElement('div');
          simpleSection.className = 'categoria-section fade-in';
          simpleSection.innerHTML = `<div class="producto-grid"></div>`;
          const simpleGrid = simpleSection.querySelector('.producto-grid');
          filtrados.forEach(p => crearCardProducto(p, simpleGrid));
          categoriasContainer.appendChild(simpleSection);
        }
      }

      function crearCardProducto(p, container) {
        const nombre = p.nombre || 'Producto';
        const descripcion = p.descripcion || 'Fresco y natural';
        const precio = p.precio || 0;
        const stock = p.stock || 0;
        const categoriasText = p.categorias || 'Varias';
        const estaAgotado = stock <= 0;

        const nombreNormal = normalizarNombre(nombre);
        const imagen = `img/productos/${nombreNormal}.jpg`;

        const card = document.createElement('div');
        card.className = `producto-card ${estaAgotado ? 'agotado' : ''}`;
        card.innerHTML = `
          <div class="card-img">
            <img src="${imagen}" alt="${nombre}" onerror="this.src='${imagenesCategoria[categoriasText] || imagenesCategoria['default']}'">
            <span class="badge">${categoriasText}</span>
            ${estaAgotado ? '<div class="sold-out">Agotado</div>' : ''}
          </div>
          <div class="card-body">
            <h4>${nombre}</h4>
            <p>${descripcion}</p>
            <div class="card-footer">
              <span class="price">${formatCurrency(precio)}</span>
              <div class="actions">
                <input type="number" class="cantidad-input" min="0.1" step="0.1" value="1" ${estaAgotado ? 'disabled' : ''}>
                <span class="unid-label">${p.tipo_venta || ''}</span>
                <button class="btn-add-mini" ${estaAgotado ? 'disabled' : ''}>Añadir</button>
              </div>
            </div>
          </div>
        `;
        container.appendChild(card);

        if (!estaAgotado) {
          const btn = card.querySelector('.btn-add-mini');
          const inp = card.querySelector('.cantidad-input');
          btn.onclick = () => {
            const cant = parseFloat(inp.value || '1');
            const item = {
              idproducto: p.idproductos,
              nombre,
              cantidad: cant,
              tipoventa: p.tipo_venta,
              precio: precio,
              subtotal: cant * precio
            };
            const carrito = JSON.parse(localStorage.getItem('carrito') || '[]');
            carrito.push(item);
            localStorage.setItem('carrito', JSON.stringify(carrito));

            btn.textContent = '✓';
            btn.classList.add('success');
            setTimeout(() => {
              btn.textContent = 'Añadir';
              btn.classList.remove('success');
            }, 1000);
          };
        }
      }

      function iniciarCarrusel(productos) {
        const section = document.getElementById('destacados-section');
        const grid = document.getElementById('carousel-grid');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        if (!section || !grid || productos.length === 0) return;

        section.style.display = 'block';

        // Cargar 8 productos sugeridos aleatorios (con stock)
        const sugeridos = productos.filter(p => p.stock > 0)
          .sort(() => 0.5 - Math.random())
          .slice(0, 8);
        grid.innerHTML = '';

        sugeridos.forEach(p => {
          const nombreNormal = normalizarNombre(p.nombre);
          const imagen = `img/productos/${nombreNormal}.jpg`;
          const fallback = imagenesCategoria[p.categorias] || imagenesCategoria['default'];

          const item = document.createElement('div');
          item.className = 'carousel-item';
          // Usamos una función para manejar el error de la imagen de fondo de forma sencilla
          item.style.backgroundImage = `linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), url('${imagen}')`;
          item.style.backgroundSize = 'cover';
          item.style.backgroundPosition = 'center';

          // Como no podemos usar onerror en background-image fácilmente sin JS adicional, 
          // confiaremos en que el degradado ayude si falla o usaremos una técnica de respaldo visual
          item.innerHTML = `
            <div>
              <span class="bad-cat">${p.categorias || 'Varias'}</span>
              <h5>${p.nombre}</h5>
              <p style="font-size: 0.85rem; color: #333; margin-bottom: 12px; font-weight: 500;">${p.descripcion || 'Fresco y natural'}</p>
            </div>
            <div>
              <div class="price">${formatCurrency(p.precio)}</div>
              <div style="font-size: 0.75rem; color: #666; font-weight: bold;">${p.tipo_venta}</div>
            </div>
          `;
          grid.appendChild(item);
        });

        if (prevBtn && nextBtn) {
          prevBtn.onclick = () => grid.scrollBy({ left: -300, behavior: 'smooth' });
          nextBtn.onclick = () => grid.scrollBy({ left: 300, behavior: 'smooth' });
        }

        // Auto-scroll aleatorio cada 4 segundos (sin repetir posición actual)
        let currentItemIndex = 0;
        setInterval(() => {
          const items = grid.querySelectorAll('.carousel-item');
          if (items.length <= 1) return;
          let next;
          do {
            next = Math.floor(Math.random() * items.length);
          } while (next === currentItemIndex);

          currentItemIndex = next;
          const targetItem = items[currentItemIndex];
          grid.scrollTo({
            left: targetItem.offsetLeft - grid.offsetLeft,
            behavior: 'smooth'
          });
        }, 4000);
      }
    });
  </script>
</body>

</html>
