<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Factura</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f1f8e9; margin: 0; }
    .container { max-width: 900px; margin: 30px auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h2 { color: #388e3c; border-bottom: 2px solid #c8e6c9; padding-bottom: 10px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .box { background: #fafafa; border: 1px solid #eee; border-radius: 8px; padding: 12px; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { border-bottom: 1px solid #eee; padding: 10px; text-align: left; }
    th { background: #f0f4c3; color: #33691e; }
    .total { text-align: right; font-weight: bold; font-size: 18px; color: #2e7d32; }
    .acciones { margin-top: 16px; display: flex; gap: 10px; }
    .acciones a, .acciones button { background: #4caf50; color: #fff; border: none; padding: 10px 14px; border-radius: 8px; text-decoration: none; cursor: pointer; }
    
    .whatsapp-btn {
      background: #25d366 !important;
      color: white !important;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
    }
    
    .whatsapp-btn:hover {
      background: #128c7e !important;
      transform: scale(1.05);
    }
    
    .mensaje-whatsapp {
      background: #e8f5e8;
      border: 2px solid #25d366;
      border-radius: 8px;
      padding: 15px;
      margin: 20px 0;
      text-align: center;
      color: #2e7d32;
    }
    
    .mensaje-whatsapp p {
      margin: 5px 0;
    }
    
    .mensaje-error {
      background: #ffebee;
      border: 2px solid #f44336;
      border-radius: 8px;
      padding: 15px;
      margin: 20px 0;
      text-align: center;
      color: #c62828;
    }
    
    .mensaje-error p {
      margin: 5px 0;
    }
  </style>
  <script src="navbar.js"></script>
  <script>
    // Función para enviar mensaje de WhatsApp
    function enviarWhatsApp(mensaje, telefonoUsuario) {
      // Formatear el teléfono para WhatsApp (agregar código de país si no lo tiene)
      let telefonoFormateado = telefonoUsuario;
      
      // Si el teléfono no empieza con código de país, agregar 57 (Colombia)
      if (!telefonoFormateado.startsWith('57')) {
        // Remover espacios, guiones y paréntesis
        telefonoFormateado = telefonoFormateado.replace(/[\s\-\(\)]/g, '');
        // Si no empieza con 57, agregarlo
        if (!telefonoFormateado.startsWith('57')) {
          telefonoFormateado = '57' + telefonoFormateado;
          const miNumeroWhatsApp = "573243538359"; // CAMBIA ESTE NÚMERO POR EL TUYO
        }
      }
      
      const url = `https://wa.me/${telefonoFormateado}?text=${encodeURIComponent(mensaje)}`;
      window.open(url, '_blank');
    }

    // Variables globales para almacenar datos de la factura
    let facturaActual = null;
    let usuarioActual = null;
    let totalActual = 0;

    // Función para enviar mensaje según el método de pago
    function enviarMensajeCompra(metodoPago, nombreUsuario, total, telefonoUsuario) {
      let mensaje = '';
      
      if (metodoPago === 'contraentrega') {
        mensaje = `Hola ${nombreUsuario}, su pedido está en camino. Por favor envíe la dirección de entrega. 🚚📦`;
      } else {
        mensaje = `Hola ${nombreUsuario}, su compra está en proceso. Por favor enviar factura de pago y la dirección. 💳📋`;
      }
      
      enviarWhatsApp(mensaje, telefonoUsuario);
    }

    // Función para reenviar mensaje de WhatsApp
    function reenviarMensajeWhatsApp() {
      if (facturaActual && usuarioActual) {
        const metodoPago = facturaActual.metodoPago || 'contraentrega';
        const nombreUsuario = usuarioActual.nombres || 'Cliente';
        const telefonoUsuario = usuarioActual.telefono || '';
        enviarMensajeCompra(metodoPago, nombreUsuario, totalActual, telefonoUsuario);
      } else {
        alert('No hay datos de factura disponibles para reenviar.');
      }
    }

    async function cargarFactura() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) {
        document.getElementById('contenido').textContent = 'Factura inválida';
        return;
      }
      const token = localStorage.getItem('token');
      if (!token) {
        alert('Debes iniciar sesión.');
        window.location.href = '/login.html';
        return;
      }
      try {
        const res = await fetch('/venta/factura/' + encodeURIComponent(id), {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data?.mensaje || 'No se pudo cargar la factura');

        const { factura, usuario, detalles, total } = data;

        // Guardar datos en variables globales para reenvío
        facturaActual = factura;
        usuarioActual = usuario;
        totalActual = total;

        document.getElementById('titulo').textContent = 'Factura #' + (factura.idFactura || 'N/A');
        document.getElementById('fact-info').innerHTML = `
          <div class="box"><b>Fecha:</b> ${factura.fecha || 'No especificada'}</div>
          <div class="box"><b>Estado:</b> ${factura.estado || 'pendiente'}</div>
        `;

        // Mostrar método de pago e instrucciones
        let instruccionesPagoHTML = '';
        const metodoPagoFactura = factura.metodoPago || 'contraentrega';
        switch (metodoPagoFactura) {
          case 'contraentrega':
            instruccionesPagoHTML = `
              <div class="box">
                <h3>Pago Contraentrega</h3>
                <p>Por favor, ten el valor exacto para el momento de la entrega.</p>
              </div>
            `;
            break;
          case 'bancolombia':
            instruccionesPagoHTML = `
              <div class="box">
                <h3>Pago por Bancolombia</h3>
                <p>Realiza tu transferencia a la cuenta de ahorros <b>XXX-XXXXXX-XX</b> a nombre de <b>Legumbrería JM</b>. Envía el comprobante a nuestro WhatsApp para confirmar tu pedido.</p>
              </div>
            `;
            break;
          case 'nequi':
            instruccionesPagoHTML = `
              <div class="box">
                <h3>Pago por Nequi</h3>
                <p>Transfiere el total a nuestro número Nequi <b>3XX XXX XXXX</b>. Envía el comprobante a nuestro WhatsApp para confirmar tu pedido.</p>
              </div>
            `;
            break;
          default:
            instruccionesPagoHTML = ''; // O un mensaje por defecto si no se reconoce el método
        }

        document.getElementById('user-info').innerHTML = `
          <div class="box"><b>Documento:</b> ${usuario.documento || 'No especificado'}</div>
          <div class="box"><b>Nombre:</b> ${usuario.nombres || 'No especificado'}</div>
          <div class="box"><b>Correo:</b> ${usuario.correo || 'No especificado'}</div>
          <div class="box"><b>Teléfono:</b> ${usuario.telefono || 'No especificado'}</div>
        `;

        // Insertar instrucciones de pago después de la información del usuario
        document.getElementById('pago-info-container').innerHTML = instruccionesPagoHTML;

        const tbody = document.getElementById('tbody');
        tbody.innerHTML = '';
        (detalles || []).forEach(d => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${d.nombre || 'Producto'}</td>
            <td>${Number(d.cantidadKg || 0).toFixed(2)} kg</td>
            <td>$${Number(d.precioUnitario || 0).toLocaleString()}</td>
            <td>$${Number(d.subTotal || 0).toLocaleString()}</td>
          `;
          tbody.appendChild(tr);
        });
        document.getElementById('total').textContent = 'Total: $' + Number(total || 0).toLocaleString();
        
        // Enviar mensaje de WhatsApp automáticamente
        const metodoPago = factura.metodoPago || 'contraentrega';
        const nombreUsuario = usuario.nombres || 'Cliente';
        const telefonoUsuario = usuario.telefono || '';
        
        if (telefonoUsuario) {
          enviarMensajeCompra(metodoPago, nombreUsuario, total, telefonoUsuario);
          // Mostrar mensaje informativo
          document.getElementById('mensajeWhatsApp').style.display = 'block';
          // Mostrar el número al que se envió
          document.getElementById('telefonoEnviado').textContent = telefonoUsuario;
        } else {
          // Si no hay teléfono, mostrar mensaje de error
          const mensajeError = document.createElement('div');
          mensajeError.className = 'mensaje-error';
          mensajeError.innerHTML = `
            <p>⚠️ <strong>No se pudo enviar el mensaje de WhatsApp</strong></p>
            <p>El usuario no tiene un número de teléfono registrado.</p>
          `;
          document.getElementById('mensajeWhatsApp').parentNode.insertBefore(mensajeError, document.getElementById('mensajeWhatsApp'));
        }
        
      } catch (e) {
        document.getElementById('contenido').textContent = 'Error: ' + (e?.message || 'No se pudo cargar');
      }
    }
    document.addEventListener('DOMContentLoaded', cargarFactura);
  </script>
  
</head>
<body>
  <div class="container" id="contenido">
    <h2 id="titulo">Factura</h2>
    <div class="grid">
      <div id="fact-info" class="grid"></div>
      <div id="user-info" class="grid"></div>
    </div>

    <div id="pago-info-container"></div>

    <table>
      <thead>
        <tr>
          <th>Producto</th>
          <th>Cantidad</th>
          <th>Precio unitario</th>
          <th>Subtotal</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="total" id="total">Total: $0</div>

    <div class="mensaje-whatsapp" id="mensajeWhatsApp" style="display: none;">
      <p>📱 <strong>Mensaje de WhatsApp enviado automáticamente</strong></p>
      <p>Se ha enviado un mensaje a su WhatsApp con las instrucciones correspondientes.</p>
      <p><small>Número: <span id="telefonoEnviado"></span></small></p>
    </div>

    <div class="acciones">
      <a href="/productos.html">Seguir comprando</a>
      <button onclick="window.print()">Imprimir</button>
      <button onclick="reenviarMensajeWhatsApp()" class="whatsapp-btn">📱 Reenviar WhatsApp</button>
    </div>
  </div>
</body>
</html>
