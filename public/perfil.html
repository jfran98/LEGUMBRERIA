<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Mi Perfil</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="css/perfil.css">
</head>

<body>

  <div class="perfil-container">
    <h2>Mi Perfil</h2>

    <div class="avatar-section">
      <img src="img/avatares/avatar-default.png" alt="Foto de perfil" class="avatar clickable" id="avatar">

      <div class="avatar-options" id="avatarOptions" style="display: none;">
        <div class="avatar-options-header">
          <h3>Seleccionar Avatar</h3>
          <button class="close-btn" onclick="avatarManager.toggleAvatarOptions()">✕</button>
        </div>

        <div class="avatar-gender-selector">
          <button class="btn-gender active" onclick="avatarManager.filrarAvatares('hombre', this)">👨 Hombre</button>
          <button class="btn-gender" onclick="avatarManager.filrarAvatares('mujer', this)">👩 Mujer</button>
        </div>
        <div class="avatar-grid" id="avatarGrid">
          <!-- Los avatares se generarán dinámicamente -->
        </div>

        <div class="upload-section">
          <h3>Subir Foto de Perfil</h3>
          <div class="file-input-wrapper">
            <span>📷 Seleccionar Imagen</span>
            <input type="file" class="file-input" id="fileInput" accept="image/*">
          </div>

          <div class="avatar-preview" id="avatarPreview" style="display: none;">
            <p>Vista previa:</p>
            <img id="previewImage" alt="Vista previa">
            <br>
            <button class="save-avatar-btn" onclick="guardarAvatarPersonalizado()">💾 Guardar Avatar</button>
          </div>
        </div>
      </div>
    </div>

    <div class="info" id="info">
      <p><strong>Nombres:</strong> <span id="nombres"></span></p>
      <p><strong>Teléfono:</strong> <span id="telefono"></span></p>
      <p><strong>Correo:</strong> <span id="correo"></span></p>
    </div>

    <p id="mensaje"></p>

    <div class="botones" id="botones">
      <button onclick="window.location.href='editar-perfil.html'">Editar Perfil</button>
    </div>
  </div>

  <div class="perfil-grid">
    <!-- ================= DIRECCIONES ================= -->
    <div class="perfil-section" onclick="toggleSection(this)">
      <h3>📍 Mis Direcciones</h3>

      <div class="section-content">
        <button id="btnToggleFormDir" class="btn-secondary" style="width:100%; margin-bottom:15px;">➕ Nueva
          Dirección</button>

        <form id="formDireccion" class="form-direccion" style="display: none;">
          <div class="form-row">
            <input type="text" id="titulo" placeholder="Ej: Casa, Trabajo" required>
            <input type="text" id="ciudad" placeholder="Ciudad" required>
          </div>

          <input type="text" id="direccion" placeholder="Dirección completa" required>
          <input type="text" id="referencia" placeholder="Referencia (opcional)">

          <div style="display:flex; gap:10px;">
            <button type="submit" class="btn-primary" style="flex:1;">Guardar</button>
            <button type="button" id="btnCancelarDir" class="btn-cancelar"
              style="background:#f3f4f6; color:#374151; border:none; padding:10px; border-radius:10px; cursor:pointer;">Cancelar</button>
          </div>
        </form>

        <div id="listaDirecciones" class="cards-container"></div>
      </div>
    </div>


    <!-- ================= PEDIDOS ================= -->
    <div class="perfil-section" onclick="toggleSection(this)">
      <h3>🛒 Mis Pedidos</h3>

      <div class="section-content">
        <div id="listaPedidos" class="cards-container"></div>
      </div>
    </div>


    <!-- ================= FACTURAS ================= -->
    <div class="perfil-section" onclick="toggleSection(this)">
      <h3>📄 Mis Facturas</h3>

      <div class="section-content">
        <div id="listaFacturas" class="cards-container"></div>
      </div>
    </div>
  </div>

  </div>


  <script src="js/avatar-manager.js"></script>
  <script>
    const token = localStorage.getItem('token');
    const mensaje = document.getElementById('mensaje');

    // Inicializar
    if (!token) {
      mensaje.textContent = '⚠️ No estás autenticado. Inicia sesión.';
      document.getElementById('info').style.display = 'none';
      document.getElementById('botones').style.display = 'none';
      document.getElementById('avatar').style.display = 'none';
      document.querySelector('.avatar-options').style.display = 'none';
    } else {
      // Cargar información del perfil
      fetch('/usuario/perfil', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
        .then(res => res.json())
        .then(data => {
          if (data.error) {
            mensaje.textContent = '❌ ' + data.error;
          } else {
            document.getElementById('nombres').textContent = data.nombres;
            document.getElementById('telefono').textContent = data.telefono;
            document.getElementById('correo').textContent = data.correo;

            // Si el backend tiene una URL de foto, usarla
            if (data.foto) {
              document.getElementById('avatar').src = data.foto;
              localStorage.setItem('avatarPersonalizada', data.foto);
            }
          }
        })
        .catch((error) => {
          console.error('Error en el fetch:', error);
          mensaje.textContent = '❌ Error al cargar perfil';
        });
    }
  </script>
  <script src="js/perfil-pedidos.js"></script>

  <script src="navbar.js"></script>
  <script>
    function toggleSection(section) {
      section.classList.toggle("active");
    }
  </script>

  <!-- ================= MODAL FACTURA ================= -->
  <div id="modalFactura" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Detalle de Factura</h3>
        <button class="close-modal-btn" onclick="cerrarModalFactura()">✕</button>
      </div>
      <div class="modal-body" id="detallesFacturaModal">
        <!-- El contenido se cargará dinámicamente -->
        <p>Cargando detalles...</p>
      </div>
    </div>
  </div>

</body>

</html>
